<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista Inteligente</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container{
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 550px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    text-align: center;
}

input{
    width: 75%;
    padding: 10px;
}

button{
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

ul{
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li{
    background: #eee;
    margin-top: 15px;
    padding: 15px;
    border-radius: 5px;
    text-align: left;
}

.data{
    font-size: 12px;
    color: gray;
    margin-top: 5px;
}

.lugar{
    margin-top: 10px;
    font-size: 14px;
    color: #333;
    line-height: 1.6;
}

.remover{
    margin-top: 10px;
    background: red;
    color: white;
    border: none;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

    <h1>Lista Inteligente</h1>

    <input 
        type="text" 
        id="tarefa" 
        placeholder="Digite vários itens separados por espaço"
    >

    <button onclick="adicionarTarefa()">
        Adicionar
    </button>

    <ul id="lista"></ul>

</div>

<script>

function adicionarTarefa(){

    let input = document.getElementById("tarefa");
    let texto = input.value.toLowerCase();

    if(texto === ""){
        alert("Digite um item!");
        return;
    }

    let lista = document.getElementById("lista");

    // separa vários itens
    let itens = texto.split(" ");

    let data = new Date();
    let dia = data.toLocaleDateString("pt-BR");
    let hora = data.toLocaleTimeString("pt-BR");

    itens.forEach(itemTexto => {

        let item = document.createElement("li");

        let sugestao = "";

        // ELETRÔNICOS
        if(
            itemTexto.includes("celular") ||
            itemTexto.includes("notebook") ||
            itemTexto.includes("fone") ||
            itemTexto.includes("tv") ||
            itemTexto.includes("tablet") ||
            itemTexto.includes("monitor") ||
            itemTexto.includes("teclado") ||
            itemTexto.includes("mouse") ||
            itemTexto.includes("camera") ||
            itemTexto.includes("videogame")
        ){

            sugestao = `
            <b>Locais para comprar eletrônicos:</b><br><br>

            <b>Lojas Online:</b><br>
            • Amazon<br>
            • Mercado Livre<br>
            • Magazine Luiza<br>
            • Shopee<br>
            • Kabum<br>
            • Casas Bahia<br>
            • Americanas<br>
            • AliExpress<br>
            • Ponto Frio<br>
            • Fast Shop<br><br>

            <b>Lojas físicas:</b><br>
            • Magazine Luiza<br>
            • Casas Bahia<br>
            • Ponto<br>
            • Lojas de informática
            `;
        }

        // SUPERMERCADO
        else if(
            itemTexto.includes("arroz") ||
            itemTexto.includes("feijão") ||
            itemTexto.includes("carne") ||
            itemTexto.includes("frango") ||
            itemTexto.includes("leite") ||
            itemTexto.includes("pão") ||
            itemTexto.includes("refrigerante") ||
            itemTexto.includes("refri") ||
            itemTexto.includes("água") ||
            itemTexto.includes("banana") ||
            itemTexto.includes("maçã") ||
            itemTexto.includes("batata") ||
            itemTexto.includes("macarrão") ||
            itemTexto.includes("café") ||
            itemTexto.includes("óleo") ||
            itemTexto.includes("açúcar")
        ){

            sugestao = `
            <b>Locais para comprar alimentos:</b><br><br>

            <b>Supermercados:</b><br>
            • Carrefour<br>
            • Assaí Atacadista<br>
            • Atacadão<br>
            • Supermercados BH<br>
            • Extra<br>
            • Dia<br>
            • Bretas<br>
            • Mart Minas<br>
            • EPA<br>
            • Supermercado local<br><br>

            <b>Comprar online:</b><br>
            • iFood<br>
            • Rappi<br>
            • Carrefour Online<br>
            • Mercado Livre Mercado<br>
            • Amazon Mercado<br>
            • Uber Eats Mercado
            `;
        }

        // ROUPAS
        else if(
            itemTexto.includes("camisa") ||
            itemTexto.includes("calça") ||
            itemTexto.includes("bermuda") ||
            itemTexto.includes("tenis") ||
            itemTexto.includes("roupa") ||
            itemTexto.includes("sapato")
        ){

            sugestao = `
            <b>Locais para comprar roupas:</b><br><br>

            <b>Lojas Online:</b><br>
            • Shein<br>
            • Shopee<br>
            • Amazon<br>
            • Mercado Livre<br>
            • Dafiti<br><br>

            <b>Lojas físicas:</b><br>
            • Renner<br>
            • C&A<br>
            • Riachuelo<br>
            • Marisa<br>
            • Centauro
            `;
        }

        // FARMÁCIA
        else if(
            itemTexto.includes("remédio") ||
            itemTexto.includes("dipirona") ||
            itemTexto.includes("vitamina") ||
            itemTexto.includes("dorflex") ||
            itemTexto.includes("paracetamol")
        ){

            sugestao = `
            <b>Locais para comprar medicamentos:</b><br><br>

            <b>Farmácias:</b><br>
            • Drogasil<br>
            • Droga Raia<br>
            • Pague Menos<br>
            • Drogaria São Paulo<br>
            • Farmácia Indiana<br>
            • Araújo<br><br>

            <b>Comprar online:</b><br>
            • iFood Farmácia<br>
            • Rappi<br>
            • Drogasil Online
            `;
        }

        // OUTROS
        else{

            sugestao = `
            <b>Locais recomendados:</b><br><br>

            • Amazon<br>
            • Mercado Livre<br>
            • Shopee<br>
            • Carrefour<br>
            • Americanas<br>
            • Magazine Luiza<br>
            • Casas Bahia<br>
            • Shopping<br>
            • Mercado local<br>
            • Loja especializada
            `;
        }

        item.innerHTML = `
            <strong>${itemTexto}</strong>

            <div class="data">
                Adicionado em: ${dia} às ${hora}
            </div>

            <div class="lugar">
                ${sugestao}
            </div>

            <button class="remover" onclick="removerTarefa(this)">
                Remover
            </button>
        `;

        lista.appendChild(item);

    });

    input.value = "";
}

function removerTarefa(botao){
    botao.parentElement.remove();
}

</script>

</body>
</html>
